<svg viewBox="0 0 700 408" width="700" height="408" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg         { fill: #f9f9f8; }
      .lbl        { font-family: system-ui, -apple-system, sans-serif; }
      .muted      { fill: #6b7280; }
      .ns-fill    { fill: #f3f3f0; }
      .ns-stroke  { stroke: #d1d1cb; }
      .ns-text    { fill: #1a1a18; }
      .arr-stroke { stroke: #6b7280; fill: none; }
      .arr-head   { fill: #6b7280; }
      @media (prefers-color-scheme: dark) {
        .bg         { fill: #222220; }
        .ns-fill    { fill: #2a2a27; }
        .ns-stroke  { stroke: #484844; }
        .ns-text    { fill: #f0f0ec; }
        .muted      { fill: #9b9b92; }
        .arr-stroke { stroke: #9b9b92; fill: none; }
        .arr-head   { fill: #9b9b92; }
      }
    </style>

    <!-- Diagonal hatch pattern for heap background -->
    <pattern id="heap-hatch" patternUnits="userSpaceOnUse" width="10" height="10">
      <path d="M-1,1 l2,-2 M0,10 l10,-10 M9,11 l2,-2" stroke="#d1d5db" stroke-width="0.8"/>
    </pattern>

    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" class="arr-head"/>
    </marker>

    <!-- Clip paths to keep cell fills within rounded card corners -->
    <clipPath id="clip-str"><rect x="220" y="55"  width="220" height="84" rx="8"/></clipPath>
    <clipPath id="clip-int"><rect x="220" y="168" width="220" height="84" rx="8"/></clipPath>
    <clipPath id="clip-flt"><rect x="220" y="281" width="220" height="84" rx="8"/></clipPath>
  </defs>

  <!-- Canvas background -->
  <rect width="700" height="408" rx="10" class="bg"/>

  <!-- Section labels -->
  <text x="93"  y="26" font-size="9" font-weight="700" text-anchor="middle" class="lbl muted">Namespace  (names)</text>
  <text x="443" y="26" font-size="9" font-weight="700" text-anchor="middle" class="lbl muted">Heap  (objects)</text>

  <!-- Namespace box -->
  <rect x="10" y="32" width="165" height="358" rx="7" stroke-width="1.3" class="ns-fill ns-stroke"/>

  <!-- Heap bounded area with hatched background -->
  <rect x="195" y="32" width="495" height="358" rx="10" fill="url(#heap-hatch)" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- ═══ NAMES ═══ -->

  <!-- city -->
  <text x="24" y="102" font-size="9" font-weight="700" class="lbl ns-text">city</text>
  <line x1="44"  y1="98"  x2="172" y2="98"  stroke-width="0.8" stroke-dasharray="2,2" class="arr-stroke"/>
  <line x1="175" y1="98"  x2="214" y2="97"  stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>

  <!-- population -->
  <text x="24" y="198" font-size="9" font-weight="700" class="lbl ns-text">population</text>
  <line x1="92"  y1="194" x2="172" y2="194" stroke-width="0.8" stroke-dasharray="2,2" class="arr-stroke"/>
  <line x1="175" y1="194" x2="214" y2="207" stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>

  <!-- alias -->
  <text x="24" y="228" font-size="9" font-weight="700" class="lbl ns-text">alias</text>
  <text x="24" y="240" font-size="7"   class="lbl muted">(= population)</text>
  <line x1="47"  y1="224" x2="172" y2="224" stroke-width="0.8" stroke-dasharray="2,2" class="arr-stroke"/>
  <line x1="175" y1="224" x2="214" y2="218" stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>

  <!-- area_km2 -->
  <text x="24" y="338" font-size="9" font-weight="700" class="lbl ns-text">area_km2</text>
  <line x1="83"  y1="334" x2="172" y2="334" stroke-width="0.8" stroke-dasharray="2,2" class="arr-stroke"/>
  <line x1="175" y1="334" x2="214" y2="323" stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>

  <!-- ═══ STR OBJECT  (y=55, center y=97) ═══ -->
  <rect x="220" y="55"  width="220" height="84" rx="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
  <g clip-path="url(#clip-str)">
    <rect x="220" y="55"  width="80"  height="84" fill="#f0fdff"/>
    <rect x="300" y="55"  width="140" height="84" fill="#fce7e7"/>
    <line x1="220" y1="83"  x2="440" y2="83"  stroke="#00bcd4" stroke-width="0.7"/>
    <line x1="220" y1="111" x2="440" y2="111" stroke="#00bcd4" stroke-width="0.7"/>
    <line x1="300" y1="55"  x2="300" y2="139" stroke="#00bcd4" stroke-width="0.7"/>
  </g>
  <rect x="220" y="55"  width="220" height="84" rx="8" fill="none" stroke="#00bcd4" stroke-width="1.5"/>
  <!-- cell text -->
  <text x="260" y="73"  font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">type</text>
  <text x="260" y="101" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">value</text>
  <text x="260" y="129" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">ref count</text>
  <text x="370" y="73"  font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#7c3aed">str</text>
  <text x="370" y="101" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#7c3aed">"Tokyo"</text>
  <text x="370" y="129" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#374151">1</text>
  <!-- label below -->
  <text x="330" y="153" font-size="8.5" text-anchor="middle" class="lbl muted">str object</text>

  <!-- ═══ INT OBJECT  (y=168, center y=210) ═══ -->
  <rect x="220" y="168" width="220" height="84" rx="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
  <g clip-path="url(#clip-int)">
    <rect x="220" y="168" width="80"  height="84" fill="#f0fdff"/>
    <rect x="300" y="168" width="140" height="84" fill="#fce7e7"/>
    <line x1="220" y1="196" x2="440" y2="196" stroke="#00bcd4" stroke-width="0.7"/>
    <line x1="220" y1="224" x2="440" y2="224" stroke="#00bcd4" stroke-width="0.7"/>
    <line x1="300" y1="168" x2="300" y2="252" stroke="#00bcd4" stroke-width="0.7"/>
  </g>
  <rect x="220" y="168" width="220" height="84" rx="8" fill="none" stroke="#00bcd4" stroke-width="1.5"/>
  <text x="260" y="186" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">type</text>
  <text x="260" y="214" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">value</text>
  <text x="260" y="242" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">ref count</text>
  <text x="370" y="186" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#065f46">int</text>
  <text x="370" y="214" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#065f46">13_960_000</text>
  <text x="370" y="242" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#374151">2</text>
  <!-- label below -->
  <text x="330" y="266" font-size="8.5" text-anchor="middle" class="lbl muted">int object</text>
  <text x="330" y="277" font-size="7"   text-anchor="middle" class="lbl muted">refs: 2 — two names, one object</text>

  <!-- ═══ FLOAT OBJECT  (y=281, center y=323) ═══ -->
  <rect x="220" y="281" width="220" height="84" rx="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5"/>
  <g clip-path="url(#clip-flt)">
    <rect x="220" y="281" width="80"  height="84" fill="#f0fdff"/>
    <rect x="300" y="281" width="140" height="84" fill="#fce7e7"/>
    <line x1="220" y1="309" x2="440" y2="309" stroke="#00bcd4" stroke-width="0.7"/>
    <line x1="220" y1="337" x2="440" y2="337" stroke="#00bcd4" stroke-width="0.7"/>
    <line x1="300" y1="281" x2="300" y2="365" stroke="#00bcd4" stroke-width="0.7"/>
  </g>
  <rect x="220" y="281" width="220" height="84" rx="8" fill="none" stroke="#00bcd4" stroke-width="1.5"/>
  <text x="260" y="299" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">type</text>
  <text x="260" y="327" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">value</text>
  <text x="260" y="355" font-size="8.5" text-anchor="middle" class="lbl" fill="#374151">ref count</text>
  <text x="370" y="299" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#1e40af">float</text>
  <text x="370" y="327" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#1e40af">2_194.0</text>
  <text x="370" y="355" font-size="8.5" font-weight="700" text-anchor="middle" class="lbl" fill="#374151">1</text>
  <!-- label below -->
  <text x="330" y="379" font-size="8.5" text-anchor="middle" class="lbl muted">float object</text>

  <!-- Footer -->
  <text x="350" y="399" font-size="7.5" text-anchor="middle" class="lbl muted">Objects carry their type — that is how dynamic typing works at run-time</text>
</svg>
