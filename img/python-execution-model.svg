<svg viewBox="0 0 660 210" width="660" height="210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg           { fill: #f9f9f8; }
      .src-fill     { fill: #eeeeff; }  .src-stroke   { stroke: #818cf8; }  .src-text  { fill: #3730a3; }  .src-sub  { fill: #6366f1; }
      .par-fill     { fill: #fdf4ff; }  .par-stroke   { stroke: #d946ef; }  .par-text  { fill: #86198f; }  .par-sub  { fill: #a21caf; }
      .cmp-fill     { fill: #dbeafe; }  .cmp-stroke   { stroke: #93c5fd; }  .cmp-text  { fill: #1e40af; }  .cmp-sub  { fill: #3b82f6; }
      .pvm-fill     { fill: #d1fae5; }  .pvm-stroke   { stroke: #6ee7b7; }  .pvm-text  { fill: #065f46; }  .pvm-sub  { fill: #059669; }
      .out-fill     { fill: #fff7ed; }  .out-stroke   { stroke: #fdba74; }  .out-text  { fill: #c2410c; }  .out-sub  { fill: #ea580c; }
      .arr-stroke   { stroke: #9b9b92; fill: none; }
      .arr-head     { fill: #9b9b92; }
      .muted        { fill: #9b9b92; }
      .lbl          { font-family: system-ui, sans-serif; }
      @media (prefers-color-scheme: dark) {
        .bg         { fill: #222220; }
        .src-fill   { fill: #1e1b4b; }  .src-stroke { stroke: #818cf8; }  .src-text { fill: #c7d2fe; }  .src-sub { fill: #a5b4fc; }
        .par-fill   { fill: #2d0a38; }  .par-stroke { stroke: #d946ef; }  .par-text { fill: #f0abfc; }  .par-sub { fill: #e879f9; }
        .cmp-fill   { fill: #1e3a5f; }  .cmp-stroke { stroke: #3b82f6; }  .cmp-text { fill: #93c5fd; }  .cmp-sub { fill: #60a5fa; }
        .pvm-fill   { fill: #052e16; }  .pvm-stroke { stroke: #22c55e; }  .pvm-text { fill: #bbf7d0; }  .pvm-sub { fill: #4ade80; }
        .out-fill   { fill: #1c0a00; }  .out-stroke { stroke: #f97316; }  .out-text { fill: #fed7aa; }  .out-sub { fill: #fb923c; }
        .arr-stroke { stroke: #6b6b65; fill: none; }
        .arr-head   { fill: #6b6b65; }
        .muted      { fill: #6b6b65; }
      }
    </style>
    <marker id="ex-arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" class="arr-head"/>
    </marker>
  </defs>

  <rect width="660" height="210" rx="10" class="bg" stroke="none"/>

  <!-- Title -->
  <text x="330" y="24" font-size="11" font-weight="700" text-anchor="middle" class="lbl muted">How CPython Executes Your Code</text>

  <!-- Box 1: Source Code -->
  <rect x="10" y="36" width="110" height="112" rx="6" class="src-fill src-stroke" stroke-width="1.3"/>
  <text x="65" y="56" font-size="10" font-weight="700" text-anchor="middle" class="lbl src-text">Source Code</text>
  <text x="65" y="70" font-size="8" text-anchor="middle" class="lbl src-sub">hello.py</text>
  <text x="65" y="90" font-size="7.5" text-anchor="middle" class="lbl src-sub">x = 42</text>
  <text x="65" y="103" font-size="7.5" text-anchor="middle" class="lbl src-sub">print(x)</text>
  <text x="65" y="116" font-size="7.5" text-anchor="middle" class="lbl src-sub">def greet():</text>
  <text x="65" y="129" font-size="7.5" text-anchor="middle" class="lbl src-sub">    ...</text>

  <!-- Arrow 1→2 -->
  <line x1="120" y1="92" x2="140" y2="92" stroke-width="1.3" class="arr-stroke" marker-end="url(#ex-arr)"/>

  <!-- Box 2: Parser / AST -->
  <rect x="142" y="36" width="110" height="112" rx="6" class="par-fill par-stroke" stroke-width="1.3"/>
  <text x="197" y="56" font-size="10" font-weight="700" text-anchor="middle" class="lbl par-text">Parser</text>
  <text x="197" y="70" font-size="8" text-anchor="middle" class="lbl par-sub">tokenise → AST</text>
  <text x="197" y="90" font-size="7.5" text-anchor="middle" class="lbl par-sub">NAME: x</text>
  <text x="197" y="103" font-size="7.5" text-anchor="middle" class="lbl par-sub">OP: =</text>
  <text x="197" y="116" font-size="7.5" text-anchor="middle" class="lbl par-sub">NUMBER: 42</text>
  <text x="197" y="129" font-size="7.5" text-anchor="middle" class="lbl par-sub">→ syntax tree</text>

  <!-- Arrow 2→3 -->
  <line x1="252" y1="92" x2="272" y2="92" stroke-width="1.3" class="arr-stroke" marker-end="url(#ex-arr)"/>

  <!-- Box 3: Compiler / Bytecode -->
  <rect x="274" y="36" width="110" height="112" rx="6" class="cmp-fill cmp-stroke" stroke-width="1.3"/>
  <text x="329" y="56" font-size="10" font-weight="700" text-anchor="middle" class="lbl cmp-text">Compiler</text>
  <text x="329" y="70" font-size="8" text-anchor="middle" class="lbl cmp-sub">→ bytecode .pyc</text>
  <text x="329" y="90" font-size="7.5" text-anchor="middle" class="lbl cmp-sub">LOAD_CONST 42</text>
  <text x="329" y="103" font-size="7.5" text-anchor="middle" class="lbl cmp-sub">STORE_NAME x</text>
  <text x="329" y="116" font-size="7.5" text-anchor="middle" class="lbl cmp-sub">LOAD_NAME x</text>
  <text x="329" y="129" font-size="7.5" text-anchor="middle" class="lbl cmp-sub">CALL print</text>

  <!-- Arrow 3→4 -->
  <line x1="384" y1="92" x2="404" y2="92" stroke-width="1.3" class="arr-stroke" marker-end="url(#ex-arr)"/>

  <!-- Box 4: PVM -->
  <rect x="406" y="36" width="110" height="112" rx="6" class="pvm-fill pvm-stroke" stroke-width="1.3"/>
  <text x="461" y="56" font-size="10" font-weight="700" text-anchor="middle" class="lbl pvm-text">PVM</text>
  <text x="461" y="70" font-size="8" text-anchor="middle" class="lbl pvm-sub">interpreter loop</text>
  <text x="461" y="90" font-size="7.5" text-anchor="middle" class="lbl pvm-sub">1. fetch opcode</text>
  <text x="461" y="103" font-size="7.5" text-anchor="middle" class="lbl pvm-sub">2. decode</text>
  <text x="461" y="116" font-size="7.5" text-anchor="middle" class="lbl pvm-sub">3. execute</text>
  <text x="461" y="129" font-size="7.5" text-anchor="middle" class="lbl pvm-sub">4. repeat ↻</text>

  <!-- Arrow 4→5 -->
  <line x1="516" y1="92" x2="536" y2="92" stroke-width="1.3" class="arr-stroke" marker-end="url(#ex-arr)"/>

  <!-- Box 5: Output -->
  <rect x="538" y="36" width="112" height="112" rx="6" class="out-fill out-stroke" stroke-width="1.3"/>
  <text x="594" y="56" font-size="10" font-weight="700" text-anchor="middle" class="lbl out-text">Output</text>
  <text x="594" y="70" font-size="8" text-anchor="middle" class="lbl out-sub">stdout / result</text>
  <text x="594" y="92" font-size="10" font-weight="700" text-anchor="middle" class="lbl out-sub">42</text>
  <text x="594" y="108" font-size="7.5" text-anchor="middle" class="lbl muted">side effects</text>
  <text x="594" y="120" font-size="7.5" text-anchor="middle" class="lbl muted">return values</text>
  <text x="594" y="132" font-size="7.5" text-anchor="middle" class="lbl muted">exceptions</text>

  <!-- Phase labels -->
  <text x="65" y="170" font-size="8" text-anchor="middle" class="lbl muted">you write</text>
  <text x="263" y="170" font-size="8" text-anchor="middle" class="lbl muted">CPython  compile-time</text>
  <text x="461" y="170" font-size="8" text-anchor="middle" class="lbl muted">run-time</text>
  <text x="594" y="170" font-size="8" text-anchor="middle" class="lbl muted">result</text>

  <!-- Bracket under boxes 2–3 (compile-time zone) -->
  <line x1="142" y1="162" x2="384" y2="162" stroke-width="0.8" stroke-dasharray="3,2" class="arr-stroke"/>
  <line x1="142" y1="158" x2="142" y2="166" stroke-width="0.8" class="arr-stroke"/>
  <line x1="384" y1="158" x2="384" y2="166" stroke-width="0.8" class="arr-stroke"/>

  <!-- Footnote -->
  <text x="330" y="196" font-size="7.5" text-anchor="middle" class="lbl muted">Bytecode is cached in __pycache__/ — unchanged files skip compile-time on the next run</text>
</svg>
